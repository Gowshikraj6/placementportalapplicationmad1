<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Placement Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #6c63ff, #00c6ff);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .card-register {
      width: 100%;
      max-width: 700px;
      border-radius: 15px;
      padding: 30px;
      background-color: #ffffff;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
    .form-control:focus {
      box-shadow: 0 0 5px rgba(108,99,255,0.5);
      border-color: #6c63ff;
    }
    h3 {
      color: #333;
      margin-bottom: 25px;
    }
    .required:after {
      content: "*";
      color: red;
      margin-left: 2px;
    }
    @media (max-width: 768px) {
      .row-cols-md-2 {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

<div class="card card-register">

  <h3 class="text-center">Register Account</h3>

  <!-- STEP 1: Choose Role -->
  <div id="roleSelect">
    <div class="mb-3">
      <label for="role" class="form-label required">Role</label>
      <select class="form-select" id="role" required onchange="showRoleForm()">
        <option value="">Select Role</option>
        <option value="STUDENT">Student</option>
        <option value="COMPANY">Company</option>
      </select>
    </div>
  </div>

  <!-- STEP 2: Form -->
  <form id="registerForm" style="display:none;" novalidate>

    <!-- Back Button -->
    <div class="mb-3">
      <button type="button" class="btn btn-secondary" onclick="goBackRole()">← Back</button>
    </div>

    <!-- STUDENT FIELDS -->
    <div id="studentFields" style="display:none;">
      <div class="row row-cols-1 row-cols-md-2 g-3">
        <div class="col">
          <label for="first_name" class="form-label required">First Name</label>
          <input type="text" class="form-control" id="first_name" name="first_name" required>
        </div>
        <div class="col">
          <label for="last_name" class="form-label">Last Name</label>
          <input type="text" class="form-control" id="last_name" name="last_name">
        </div>
        <div class="col">
          <label for="roll_number" class="form-label required">Roll Number</label>
          <input type="text" class="form-control" id="roll_number" name="roll_number" required>
        </div>
        <div class="col">
          <label for="email" class="form-label required">Email</label>
          <input type="email" class="form-control" id="email" name="email" required>
        </div>
        <div class="col">
          <label for="phone" class="form-label required">Phone</label>
          <input type="tel" class="form-control" id="phone" name="phone" required pattern="[0-9]{10}" title="10 digit phone number">
        </div>
        <div class="col">
          <label for="department" class="form-label required">Department</label>
          <input type="text" class="form-control" id="department" name="department" required>
        </div>
        <div class="col">
          <label for="degree" class="form-label required">Degree</label>
          <input type="text" class="form-control" id="degree" name="degree" required>
        </div>
        <div class="col">
          <label for="batch_year" class="form-label required">Batch Year</label>
          <input type="number" class="form-control" id="batch_year" name="batch_year" required min="2000" max="2100">
        </div>
        <div class="col">
          <label for="cgpa" class="form-label">CGPA</label>
          <input type="number" class="form-control" id="cgpa" name="cgpa" step="0.01" min="0" max="10">
        </div>
        <div class="col">
          <label for="skills" class="form-label">Skills</label>
          <input type="text" class="form-control" id="skills" name="skills" placeholder="Python, SQL, React">
        </div>
      </div>
    </div>

    <!-- COMPANY FIELDS -->
    <div id="companyFields" style="display:none;">
      <div class="row row-cols-1 row-cols-md-2 g-3">
        <div class="col">
          <label for="company_name" class="form-label required">Company Name</label>
          <input type="text" class="form-control" id="company_name" name="company_name" required>
        </div>
        <div class="col">
          <label for="website" class="form-label">Website</label>
          <input type="url" class="form-control" id="website" name="website">
        </div>
        <div class="col">
          <label for="description" class="form-label">Description</label>
          <textarea class="form-control" id="description" name="description"></textarea>
        </div>
        <div class="col">
          <label for="industry" class="form-label">Industry</label>
          <input type="text" class="form-control" id="industry" name="industry">
        </div>
        <div class="col">
          <label for="headquarters" class="form-label">Headquarters</label>
          <input type="text" class="form-control" id="headquarters" name="headquarters">
        </div>
      </div>
    </div>

    <!-- COMMON FIELDS -->
    <div class="row row-cols-1 row-cols-md-3 g-3 mt-3">
      <div class="col">
        <label for="username" class="form-label required">Username</label>
        <input type="text" class="form-control" id="username" name="username" required>
      </div>
      <div class="col">
        <label for="password" class="form-label required">Password</label>
        <input type="password" class="form-control" id="password" name="password" required>
      </div>
    </div>

    <button type="submit" class="btn btn-success w-100 mt-4">Register</button>
    <div class="mt-3 text-center">
      <span>Already have an account? <a href="{{ url_for('login') }}">Login here</a></span>
    </div>
  </form>
</div>

<script>
function showRoleForm() {
  var role = document.getElementById("role").value;
  document.getElementById("roleSelect").style.display = "none";
  document.getElementById("registerForm").style.display = "block";

  document.getElementById("studentFields").style.display = role === "STUDENT" ? "block" : "none";
  document.getElementById("companyFields").style.display = role === "COMPANY" ? "block" : "none";
}

function goBackRole() {
  document.getElementById("roleSelect").style.display = "block";
  document.getElementById("registerForm").style.display = "none";

  document.getElementById("studentFields").style.display = "none";
  document.getElementById("companyFields").style.display = "none";
  document.getElementById("role").value = "";
}

// Handle API call
document.getElementById("registerForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const role = document.getElementById("role").value;
  let url = "";
  let data = {
    username: document.getElementById("username").value,
    password: document.getElementById("password").value,
    email: document.getElementById("email")?.value || ""
  };

  if(role === "STUDENT") {
    url = "/register/register_student";
    data.first_name = document.getElementById("first_name").value;
    data.last_name = document.getElementById("last_name").value;
    data.roll_number = document.getElementById("roll_number").value;
    data.phone = document.getElementById("phone").value;
    data.department = document.getElementById("department").value;
    data.degree = document.getElementById("degree").value;
    data.batch_year = parseInt(document.getElementById("batch_year").value);
    data.cgpa = parseFloat(document.getElementById("cgpa").value || 0);
    data.skills = document.getElementById("skills").value;
    data.role = "STUDENT";
  } else if(role === "COMPANY") {
    url = "/register/register_company";
    data.company_name = document.getElementById("company_name").value;
    data.website = document.getElementById("website").value;
    data.description = document.getElementById("description").value;
    data.industry = document.getElementById("industry").value;
    data.headquarters = document.getElementById("headquarters").value;
    data.role = "COMPANY";
  } else {
    alert("Please select a role.");
    return;
  }

  try {
    const res = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });

    const result = await res.json();

    if(res.ok) {
      alert(result.message || "Registration successful!");
      window.location.href = "{{ url_for('login') }}";
    } else {
      alert(result.message || "Error during registration!");
    }
  } catch(err) {
    alert("Server error. Try again later.");
    console.error(err);
  }
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
