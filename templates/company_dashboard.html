<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Company Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container py-4">

<h2 class="mb-4">Welcome, {{ company.company_name }}</h2>


<!-- Tabs -->

<ul class="nav nav-tabs">

<li class="nav-item">
<button class="nav-link active" data-bs-toggle="tab" data-bs-target="#drives">
Placement Drives
</button>
</li>

<li class="nav-item">
<button class="nav-link" data-bs-toggle="tab" data-bs-target="#create">
Create Drive
</button>
</li>

<li class="nav-item">
<button class="nav-link" data-bs-toggle="tab" data-bs-target="#applications">
Applications
</button>
</li>

</ul>


<div class="tab-content mt-3">


<!-- DRIVES TAB -->

<div class="tab-pane fade show active" id="drives">

<table class="table table-striped table-bordered">

<thead>

<tr>
<th>ID</th>
<th>Job Title</th>
<th>Location</th>
<th>Salary</th>
<th>Status</th>
<th>Applications</th>
</tr>

</thead>

<tbody id="drivesTable"></tbody>

</table>

</div>



<!-- CREATE DRIVE TAB -->

<div class="tab-pane fade" id="create">

<div class="card">

<div class="card-body">

<div class="row">

<div class="col-md-4">
<input id="job_title" class="form-control" placeholder="Job Title">
</div>

<div class="col-md-4">
<input id="location" class="form-control" placeholder="Location">
</div>

<div class="col-md-4">
<input id="salary" class="form-control" placeholder="Salary Package">
</div>

</div>

<br>

<textarea id="job_description" class="form-control" placeholder="Job Description"></textarea>

<br>

<div class="row">

<div class="col-md-4">
<input id="eligibility" class="form-control" placeholder="Eligibility Criteria">
</div>

<div class="col-md-4">
<input id="cgpa" class="form-control" placeholder="Minimum CGPA">
</div>

<div class="col-md-4">
<input id="deadline" type="date" class="form-control">
</div>

</div>

<br>

<button class="btn btn-success" onclick="createDrive()">Create Drive</button>

</div>

</div>

</div>



<!-- APPLICATIONS TAB -->

<div class="tab-pane fade" id="applications">

<table class="table table-striped table-bordered">

<thead>

<tr>
<th>Application ID</th>
<th>Student ID</th>
<th>Status</th>
<th>View Student</th>
<th>Action</th>
</tr>

</thead>

<tbody id="applicationsTable"></tbody>

</table>

</div>


</div>

</div>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>

<script>

const companyId = {{ company_id }}


// ---------------------
// Load Placement Drives
// ---------------------

function loadDrives(){

fetch(`/company/${companyId}/placement-drives`)

.then(res=>res.json())

.then(data=>{

let table=""

data.forEach(d=>{

table+=`

<tr>

<td>${d.id}</td>
<td>${d.job_title}</td>
<td>${d.location}</td>
<td>${d.salary_package}</td>
<td>${d.status}</td>

<td>

<button class="btn btn-primary btn-sm"
onclick="viewApplications(${d.id})">

View Applications

</button>

</td>

</tr>

`

})

document.getElementById("drivesTable").innerHTML=table

})

}



// ---------------------
// Create Placement Drive
// ---------------------

function createDrive(){

let data={

company_id:companyId,
job_title:document.getElementById("job_title").value,
job_description:document.getElementById("job_description").value,
eligibility_criteria:document.getElementById("eligibility").value,
minimum_CGPA:document.getElementById("cgpa").value,
application_deadline:document.getElementById("deadline").value,
location:document.getElementById("location").value,
salary_package:document.getElementById("salary").value

}


fetch("/company/placement-drives",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(data)

})

.then(res=>res.json())

.then(data=>{

alert("Placement Drive Created")

loadDrives()

})

}



// ---------------------
// View Applications
// ---------------------

function viewApplications(driveId){

fetch(`/company/placement-drives/${driveId}/applications`)

.then(res=>res.json())

.then(data=>{

let table=""

data.forEach(a=>{

table+=`

<tr>

<td>${a.id}</td>
<td>${a.student_id}</td>
<td>${a.status}</td>

<td>

<button class="btn btn-info btn-sm"
onclick="viewStudent(${a.student_id})">

View

</button>

</td>

<td>

<button class="btn btn-success btn-sm"
onclick="updateStatus(${a.id},'APPROVED')">

Approve

</button>

<button class="btn btn-danger btn-sm"
onclick="updateStatus(${a.id},'REJECTED')">

Reject

</button>

</td>

</tr>

`

})

document.getElementById("applicationsTable").innerHTML=table

})

}



// ---------------------
// View Student Details
// ---------------------

function viewStudent(studentId){

fetch(`/students/${studentId}`)

.then(res=>res.json())

.then(data=>{

alert(

"Name: "+data.first_name+" "+data.last_name+
"\nEmail: "+data.email+
"\nRoll Number: "+data.roll_number

)

})

}



// ---------------------
// Update Application Status
// ---------------------

function updateStatus(appId,status){

fetch(`/company/applications/${appId}/status`,{

method:"PUT",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({status:status})

})

.then(res=>res.json())

.then(data=>{

alert("Application "+status)

})

}


loadDrives()

</script>

</body>
</html>
